<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="100%" role="img" aria-label="The mental model — octopus, activities, tasks, sessions, memory, handoffs">
  <defs>
    <marker id="mm-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="arr-fill"/>
    </marker>
    <style>
      :root {
        --fg: #1A1B22;
        --muted: #4A4D58;
        --dim: #6B6E7A;
        --line: #9CA0AE;
        --fill-purple: #F3ECFC;
        --fill-blue:   #E8F0FB;
        --fill-yellow: #FBF2D4;
        --fill-teal:   #DCFAF3;
        --fill-pink:   #FCE4EB;
        --stroke-purple: #7C4DD9;
        --stroke-blue:   #3D7CC4;
        --stroke-yellow: #B58A0F;
        --stroke-teal:   #1FA587;
        --stroke-pink:   #C9466B;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #F5F5F7;
          --muted: #C4C7D2;
          --dim: #8A8D9A;
          --line: #5A5D6A;
          --fill-purple: #2A2540;
          --fill-blue:   #1F2A3A;
          --fill-yellow: #3A2F1A;
          --fill-teal:   #1F3530;
          --fill-pink:   #3A1F25;
          --stroke-purple: #CBA6F7;
          --stroke-blue:   #7AB8FF;
          --stroke-yellow: #FACC15;
          --stroke-teal:   #5EEAD4;
          --stroke-pink:   #F38BA8;
        }
      }
      .root  { font-family: -apple-system, system-ui, sans-serif; font-size: 16px; font-weight: 800; fill: var(--fg); }
      .lvl1  { font-family: -apple-system, system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: var(--fg); }
      .lvl2  { font-family: -apple-system, system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: var(--fg); }
      .desc  { font-family: -apple-system, system-ui, sans-serif; font-size: 11px; fill: var(--muted); }
      .muted { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 10px; fill: var(--dim); }
      .conn  { stroke: var(--line); stroke-width: 1.5; fill: none; }
      .arr-fill { fill: var(--line); }
      .card-purple { fill: var(--fill-purple); stroke: var(--stroke-purple); }
      .card-blue   { fill: var(--fill-blue);   stroke: var(--stroke-blue); }
      .card-yellow { fill: var(--fill-yellow); stroke: var(--stroke-yellow); }
      .card-teal   { fill: var(--fill-teal);   stroke: var(--stroke-teal); }
      .card-pink   { fill: var(--fill-pink);   stroke: var(--stroke-pink); }
    </style>
  </defs>

  <!-- top: octopus (orchestrator) -->
  <rect class="card-purple" x="290" y="20" width="180" height="56" rx="10" stroke-width="2"/>
  <text x="380" y="44" class="root" text-anchor="middle">🐙 octopus</text>
  <text x="380" y="62" class="desc" text-anchor="middle">one CLI, everywhere</text>

  <!-- connectors -->
  <line class="conn" x1="380" y1="76" x2="380" y2="100"/>
  <line class="conn" x1="130" y1="100" x2="630" y2="100"/>
  <line class="conn" x1="130" y1="100" x2="130" y2="120" marker-end="url(#mm-arr)"/>
  <line class="conn" x1="380" y1="100" x2="380" y2="120" marker-end="url(#mm-arr)"/>
  <line class="conn" x1="630" y1="100" x2="630" y2="120" marker-end="url(#mm-arr)"/>

  <!-- 3 activities -->
  <rect class="card-blue" x="60" y="125" width="140" height="44" rx="8" stroke-width="1.5"/>
  <text x="130" y="146" class="lvl1" text-anchor="middle">activity</text>
  <text x="130" y="162" class="desc" text-anchor="middle">a project folder</text>

  <rect class="card-blue" x="310" y="125" width="140" height="44" rx="8" stroke-width="2.5"/>
  <text x="380" y="146" class="lvl1" text-anchor="middle">activity</text>
  <text x="380" y="162" class="desc" text-anchor="middle">a project folder</text>

  <rect class="card-blue" x="560" y="125" width="140" height="44" rx="8" stroke-width="1.5"/>
  <text x="630" y="146" class="lvl1" text-anchor="middle">activity</text>
  <text x="630" y="162" class="desc" text-anchor="middle">a project folder</text>

  <!-- focus arrow on middle activity -->
  <line class="conn" x1="380" y1="169" x2="380" y2="195"/>

  <!-- splay into 4 children -->
  <line class="conn" x1="130" y1="195" x2="630" y2="195"/>
  <line class="conn" x1="130" y1="195" x2="130" y2="215" marker-end="url(#mm-arr)"/>
  <line class="conn" x1="295" y1="195" x2="295" y2="215" marker-end="url(#mm-arr)"/>
  <line class="conn" x1="460" y1="195" x2="460" y2="215" marker-end="url(#mm-arr)"/>
  <line class="conn" x1="630" y1="195" x2="630" y2="215" marker-end="url(#mm-arr)"/>

  <!-- tasks -->
  <rect class="card-yellow" x="65" y="220" width="130" height="62" rx="8" stroke-width="1.5"/>
  <text x="130" y="242" class="lvl2" text-anchor="middle">tasks</text>
  <text x="130" y="260" class="desc" text-anchor="middle">the items</text>
  <text x="130" y="274" class="desc" text-anchor="middle">to do</text>

  <!-- sessions -->
  <rect class="card-teal" x="230" y="220" width="130" height="62" rx="8" stroke-width="1.5"/>
  <text x="295" y="242" class="lvl2" text-anchor="middle">sessions</text>
  <text x="295" y="260" class="desc" text-anchor="middle">work blocks,</text>
  <text x="295" y="274" class="desc" text-anchor="middle">dated</text>

  <!-- memory -->
  <rect class="card-purple" x="395" y="220" width="130" height="62" rx="8" stroke-width="1.5"/>
  <text x="460" y="242" class="lvl2" text-anchor="middle">memory</text>
  <text x="460" y="260" class="desc" text-anchor="middle">append-only</text>
  <text x="460" y="274" class="desc" text-anchor="middle">journal</text>

  <!-- handoffs -->
  <rect class="card-pink" x="565" y="220" width="130" height="62" rx="8" stroke-width="1.5"/>
  <text x="630" y="242" class="lvl2" text-anchor="middle">handoffs</text>
  <text x="630" y="260" class="desc" text-anchor="middle">notes for</text>
  <text x="630" y="274" class="desc" text-anchor="middle">future you</text>

  <!-- muted file-name hints -->
  <text x="130" y="306" class="muted" text-anchor="middle">.octopus/tasks/</text>
  <text x="295" y="306" class="muted" text-anchor="middle">.octopus/sessions/</text>
  <text x="460" y="306" class="muted" text-anchor="middle">.octopus/memory.md</text>
  <text x="630" y="306" class="muted" text-anchor="middle">.octopus/handoffs/</text>

  <!-- caption -->
  <text x="380" y="350" class="desc" text-anchor="middle">three nouns, one orchestrator — read it as octopus → activity → task</text>
</svg>
