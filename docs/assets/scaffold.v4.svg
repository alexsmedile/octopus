<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="100%" role="img" aria-label="Octopus folder scaffold — tree view">
  <defs>
    <style>
      svg {
        --fg: #1A1B22;
        --muted: #3A3D48;
        --dim: #6B6E7A;
        --tag: #6B6E7A;
        --opt: #6B6E7A;
        --opt-meta: #8A8D9A;
        --panel-bg: #F7F7FB;
        --panel-border: #D5D7E0;
        --guide: #C4C7D2;
        --accent: #7C4DD9;
        --c-backlog: #3D7CC4;
        --c-next:    #1FA587;
        --c-now:     #B58A0F;
        --c-done:    #2A8A3F;
        --c-dropped: #6B6E7A;
      }
      @media (prefers-color-scheme: dark) {
        svg {
          --fg: #F5F5F7;
          --muted: #C4C7D2;
          --dim: #8A8D9A;
          --tag: #8A8D9A;
          --opt: #8A8D9A;
          --opt-meta: #6B6E7A;
          --panel-bg: #1A1B22;
          --panel-border: #3A3D48;
          --guide: #3A3D48;
          --accent: #CBA6F7;
          --c-backlog: #A8C9FF;
          --c-next:    #A0E9DA;
          --c-now:     #F5D75F;
          --c-done:    #A8E5B0;
          --c-dropped: #A0A3B0;
        }
      }
      .panel  { fill: var(--panel-bg); stroke: var(--panel-border); }
      .mono   { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; fill: var(--fg); }
      .folder { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; fill: var(--accent); font-weight: 600; }
      .file   { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; fill: var(--fg); }
      .opt    { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; fill: var(--opt); }
      .tag    { font-family: -apple-system, system-ui, sans-serif; font-size: 10px; fill: var(--tag); }
      .head   { font-family: -apple-system, system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: var(--fg); }
      .note   { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; fill: var(--muted); }
      .guide  { stroke: var(--guide); stroke-width: 1; fill: none; }
      .accent { fill: var(--accent); }
      .b-backlog { fill: var(--c-backlog); }
      .b-next    { fill: var(--c-next); }
      .b-now     { fill: var(--c-now); }
      .b-done    { fill: var(--c-done); }
      .b-dropped { fill: var(--c-dropped); }
      .opt-meta  { fill: var(--opt-meta); }
      .canvas-bg { fill: var(--panel-bg); }
    </style>
  </defs>
  <rect class="canvas-bg" x="0" y="0" width="760" height="520" rx="14"/>

  <!-- Left column: the tree -->
  <rect class="panel" x="20" y="20" width="450" height="480" rx="12"/>

  <text x="40" y="56" class="folder">📁 ~/code/my-project/</text>
  <text x="250" y="56" class="tag">— any folder on disk</text>

  <line class="guide" x1="60" y1="66" x2="60" y2="460"/>

  <line class="guide" x1="60" y1="90" x2="78" y2="90"/>
  <text x="84" y="94" class="folder">📁 .octopus/</text>
  <text x="220" y="94" class="tag">— the brain (hidden, self-contained)</text>

  <line class="guide" x1="100" y1="100" x2="100" y2="430"/>

  <line class="guide" x1="100" y1="124" x2="118" y2="124"/>
  <text x="124" y="128" class="file">📄 activity.md</text>
  <text x="250" y="128" class="tag">required · identity card</text>

  <line class="guide" x1="100" y1="152" x2="118" y2="152"/>
  <text x="124" y="156" class="opt">⚙️ config.toml</text>
  <text x="250" y="156" class="tag">optional · per-activity overrides</text>

  <line class="guide" x1="100" y1="184" x2="118" y2="184"/>
  <text x="124" y="188" class="folder">📁 tasks/</text>
  <text x="250" y="188" class="tag">one .md per task, sorted by bucket</text>

  <line class="guide" x1="140" y1="194" x2="140" y2="332"/>

  <line class="guide" x1="140" y1="212" x2="158" y2="212"/>
  <text x="164" y="216" class="file b-backlog">📂 backlog/</text>

  <line class="guide" x1="140" y1="236" x2="158" y2="236"/>
  <text x="164" y="240" class="file b-next">📂 next/</text>

  <line class="guide" x1="140" y1="260" x2="158" y2="260"/>
  <text x="164" y="264" class="file b-now">📂 now/</text>

  <line class="guide" x1="140" y1="284" x2="158" y2="284"/>
  <text x="164" y="288" class="file b-done">📂 done/</text>

  <line class="guide" x1="140" y1="308" x2="158" y2="308"/>
  <text x="164" y="312" class="file b-dropped">📂 dropped/</text>

  <line class="guide" x1="100" y1="356" x2="118" y2="356"/>
  <text x="124" y="360" class="opt">📂 sessions/</text>
  <text x="250" y="360" class="tag">optional · where work happened, dated</text>

  <line class="guide" x1="100" y1="384" x2="118" y2="384"/>
  <text x="124" y="388" class="opt">📂 handoffs/</text>
  <text x="250" y="388" class="tag">optional · notes for future-you / agents</text>

  <line class="guide" x1="100" y1="412" x2="118" y2="412"/>
  <text x="124" y="416" class="opt">📄 memory.md</text>
  <text x="250" y="416" class="tag">optional · accumulated context</text>

  <line class="guide" x1="60" y1="450" x2="78" y2="450"/>
  <text x="84" y="454" class="opt">📁 …your code, your notes, anything else</text>
  <text x="84" y="478" class="tag opt-meta">Octopus doesn't touch any of it.</text>

  <!-- Right column: the radical bit -->
  <rect class="panel" x="490" y="20" width="250" height="480" rx="12"/>
  <text x="510" y="56" class="head">The radical bit</text>

  <text x="510" y="88" class="note">No database file you</text>
  <text x="510" y="106" class="note">can lose. Just folders</text>
  <text x="510" y="124" class="note">and markdown.</text>

  <text x="510" y="160" class="note">Move the folder?</text>
  <text x="510" y="178" class="note accent">→ the activity moves too.</text>

  <text x="510" y="214" class="note">Open it in Obsidian?</text>
  <text x="510" y="232" class="note accent">→ filter your way in.</text>

  <text x="510" y="268" class="note">Hand it to an AI agent?</text>
  <text x="510" y="286" class="note accent">→ it reads the same files.</text>

  <text x="510" y="322" class="note">grep, find, git, diff —</text>
  <text x="510" y="340" class="note accent">→ all your tools just work.</text>
</svg>
