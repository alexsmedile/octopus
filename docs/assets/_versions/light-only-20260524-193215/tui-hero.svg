<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" width="100%" role="img" aria-label="Octopus TUI — focus mode mockup">
  <defs>
    <linearGradient id="winBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15161D"/>
      <stop offset="100%" stop-color="#0F1014"/>
    </linearGradient>
    <filter id="winShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .mono   { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .ttl    { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; fill: #8A8D9A; }
    .hdr    { font-size: 12px; fill: #C4C7D2; font-weight: 600; }
    .pane-h { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; }
    .row    { font-size: 13px; fill: #E4E6F0; }
    .row-d  { font-size: 13px; fill: #8A8D9A; }
    .row-p  { font-size: 13px; fill: #FACC15; font-weight: 600; }
    .meta   { font-size: 10.5px; fill: #6B6E7A; }
    .key    { font-size: 11px; fill: #1A1A1A; font-weight: 700; font-family: ui-monospace, monospace; }
    .keylbl { font-size: 11px; fill: #C4C7D2; }
    .pin    { font-size: 13px; fill: #FACC15; }
    .check  { font-size: 13px; fill: #5EEAD4; }
    .tag    { font-size: 10px; font-weight: 600; }
  </style>

  <!-- terminal window -->
  <g filter="url(#winShadow)">
    <rect x="20" y="20" width="940" height="520" rx="14" fill="url(#winBg)" stroke="#2A2D38" stroke-width="1"/>

    <!-- title bar -->
    <rect x="20" y="20" width="940" height="36" rx="14" fill="#1A1B22"/>
    <rect x="20" y="40" width="940" height="16" fill="#1A1B22"/>
    <!-- traffic lights -->
    <circle cx="42" cy="38" r="6.5" fill="#FF5F57"/>
    <circle cx="62" cy="38" r="6.5" fill="#FEBC2E"/>
    <circle cx="82" cy="38" r="6.5" fill="#28C840"/>
    <text x="490" y="43" class="ttl" text-anchor="middle">octopus tui — ~/code/my-project</text>

    <!-- ── HEADER BAR ─────────────────────────────────── -->
    <rect x="20" y="56" width="940" height="56" fill="#13141B"/>
    <line x1="20" y1="112" x2="960" y2="112" stroke="#2A2D38"/>

    <!-- mascot (mini) -->
    <g transform="translate(46,68)" shape-rendering="crispEdges">
      <!-- 16x14 grid at 2.4px per cell = 38.4px wide -->
      <g fill="#CBA6F7">
        <!-- top of head -->
        <rect x="9.6" y="0" width="19.2" height="2.4"/>
        <rect x="7.2" y="2.4" width="24" height="2.4"/>
        <rect x="4.8" y="4.8" width="28.8" height="2.4"/>
        <rect x="4.8" y="7.2" width="28.8" height="2.4"/>
        <rect x="4.8" y="9.6" width="9.6" height="2.4"/>
        <rect x="19.2" y="9.6" width="14.4" height="2.4"/>
        <rect x="4.8" y="12" width="9.6" height="2.4"/>
        <rect x="19.2" y="12" width="14.4" height="2.4"/>
        <rect x="2.4" y="14.4" width="33.6" height="2.4"/>
        <rect x="2.4" y="16.8" width="33.6" height="2.4"/>
        <!-- legs row -->
        <rect x="2.4" y="19.2" width="4.8" height="4.8"/>
        <rect x="12" y="19.2" width="4.8" height="4.8"/>
        <rect x="21.6" y="19.2" width="4.8" height="4.8"/>
        <rect x="31.2" y="19.2" width="4.8" height="4.8"/>
        <rect x="0" y="24" width="4.8" height="4.8"/>
        <rect x="9.6" y="24" width="4.8" height="4.8"/>
        <rect x="19.2" y="24" width="4.8" height="4.8"/>
        <rect x="33.6" y="24" width="4.8" height="4.8"/>
      </g>
      <!-- eyes -->
      <g fill="#1A1A1A">
        <rect x="14.4" y="9.6" width="4.8" height="4.8"/>
        <rect x="28.8" y="9.6" width="4.8" height="4.8"/>
      </g>
    </g>

    <!-- header text -->
    <text x="100" y="78" class="mono hdr" fill="#CBA6F7">🐙 my-project</text>
    <text x="100" y="96" class="mono" font-size="11" fill="#8A8D9A">/Users/you/code/my-project</text>

    <!-- mode tabs -->
    <g transform="translate(560,68)">
      <rect x="0" y="0" width="92" height="32" rx="6" fill="#2A2540" stroke="#CBA6F7"/>
      <text x="46" y="20" class="mono" font-size="12" fill="#CBA6F7" font-weight="700" text-anchor="middle">[1] Focus</text>
      <rect x="100" y="0" width="92" height="32" rx="6" fill="#16171E" stroke="#3A3D48"/>
      <text x="146" y="20" class="mono" font-size="12" fill="#8A8D9A" text-anchor="middle">[2] Board</text>
    </g>

    <!-- counters -->
    <g transform="translate(790,76)">
      <text x="0"  y="0"  class="mono" font-size="11" fill="#FACC15">●</text>
      <text x="14" y="0"  class="mono" font-size="12" fill="#E4E6F0">now</text>
      <text x="50" y="0"  class="mono" font-size="12" fill="#FACC15" font-weight="700">2</text>
      <text x="0"  y="18" class="mono" font-size="11" fill="#5EEAD4">○</text>
      <text x="14" y="18" class="mono" font-size="12" fill="#E4E6F0">next</text>
      <text x="50" y="18" class="mono" font-size="12" fill="#5EEAD4" font-weight="700">3</text>
      <text x="80" y="0"  class="mono" font-size="12" fill="#E4E6F0">backlog</text>
      <text x="140" y="0" class="mono" font-size="12" fill="#7AB8FF" font-weight="700">7</text>
      <text x="80" y="18" class="mono" font-size="12" fill="#E4E6F0">done</text>
      <text x="140" y="18" class="mono" font-size="12" fill="#86EFAC" font-weight="700">14</text>
    </g>

    <!-- ── BODY: 3 panes ──────────────────────────────── -->
    <!-- BACKLOG (left, tall) -->
    <rect x="36" y="128" width="288" height="340" rx="8" fill="#13141B" stroke="#2A2D38"/>
    <rect x="36" y="128" width="288" height="28" rx="8" fill="#1F2A3A"/>
    <rect x="36" y="148" width="288" height="8" fill="#1F2A3A"/>
    <text x="52" y="146" class="mono pane-h" fill="#7AB8FF">▾ BACKLOG · 7</text>

    <!-- backlog rows -->
    <g transform="translate(52,178)">
      <text x="0" y="0"   class="mono row">▸ ship the TUI</text>
      <text x="0" y="16"  class="mono meta">code · captured 3d ago</text>

      <text x="0" y="44"  class="mono row">▸ wire skill reference docs</text>
      <text x="0" y="60"  class="mono meta">docs · captured 5d ago</text>

      <text x="0" y="88"  class="mono row">▸ refactor activity router</text>
      <text x="0" y="104" class="mono meta">code · captured yesterday</text>

      <text x="0" y="132" class="mono row">▸ design v2 mascot poses</text>
      <text x="0" y="148" class="mono meta">design · captured today</text>

      <text x="0" y="176" class="mono row-d">▸ explore Go rewrite (someday)</text>
      <text x="0" y="192" class="mono meta">research</text>

      <text x="0" y="220" class="mono row-d">▸ write the changelog automation</text>
      <text x="0" y="236" class="mono meta">tooling</text>
    </g>

    <!-- NOW (middle, highlighted/focused) -->
    <rect x="340" y="128" width="304" height="200" rx="8" fill="#1A1620" stroke="#FACC15" stroke-width="2"/>
    <rect x="340" y="128" width="304" height="28" rx="8" fill="#3A2F1A"/>
    <rect x="340" y="148" width="304" height="8" fill="#3A2F1A"/>
    <text x="356" y="146" class="mono pane-h" fill="#FACC15">● NOW · 2</text>

    <g transform="translate(356,178)">
      <!-- pinned task (highlighted/selected row) -->
      <rect x="-10" y="-14" width="284" height="44" rx="6" fill="#2A2520" stroke="#FACC15" stroke-dasharray="3,2"/>
      <text x="0" y="2"  class="pin mono">📌</text>
      <text x="20" y="2" class="mono row-p">fix the webhook auth bug</text>
      <text x="20" y="20" class="mono meta">code · started today · started 2h ago</text>

      <text x="0"  y="58"  class="mono row">▸ handoff template review</text>
      <text x="0"  y="74"  class="mono meta">docs · started yesterday</text>

      <rect x="-10" y="98" width="284" height="40" rx="6" fill="#1F2A1F" stroke="#86EFAC" stroke-width="1" opacity="0.6"/>
      <text x="0"  y="116" class="check mono">✓</text>
      <text x="20" y="116" class="mono row-d">add focus-mode keymap</text>
      <text x="20" y="132" class="mono meta">just finished · slide to done</text>
    </g>

    <!-- NEXT (middle-lower) -->
    <rect x="340" y="340" width="304" height="128" rx="8" fill="#13141B" stroke="#2A2D38"/>
    <rect x="340" y="340" width="304" height="28" rx="8" fill="#1F3530"/>
    <rect x="340" y="360" width="304" height="8" fill="#1F3530"/>
    <text x="356" y="358" class="mono pane-h" fill="#5EEAD4">○ NEXT · 3</text>

    <g transform="translate(356,388)">
      <text x="0" y="0"  class="mono row">▸ sqlite index migrations</text>
      <text x="0" y="16" class="mono meta">code · queued for tomorrow</text>

      <text x="0" y="44" class="mono row">▸ write release notes</text>
      <text x="0" y="60" class="mono meta">docs · queued</text>
    </g>

    <!-- DETAIL PANE (right) -->
    <rect x="660" y="128" width="284" height="340" rx="8" fill="#13141B" stroke="#2A2D38"/>
    <rect x="660" y="128" width="284" height="28" rx="8" fill="#2A2540"/>
    <rect x="660" y="148" width="284" height="8" fill="#2A2540"/>
    <text x="676" y="146" class="mono pane-h" fill="#CBA6F7">▾ DETAIL</text>

    <g transform="translate(676,178)" font-family="ui-monospace, monospace">
      <text x="0" y="0"  font-size="13" fill="#FACC15" font-weight="700">📌 fix the webhook auth bug</text>

      <text x="0" y="32"  font-size="11" fill="#8A8D9A">bucket</text>
      <text x="100" y="32" font-size="11" fill="#FACC15">now</text>

      <text x="0" y="50"  font-size="11" fill="#8A8D9A">stage</text>
      <text x="100" y="50" font-size="11" fill="#E4E6F0">debugging</text>

      <text x="0" y="68"  font-size="11" fill="#8A8D9A">pinned</text>
      <text x="100" y="68" font-size="11" fill="#FACC15">true</text>

      <text x="0" y="86"  font-size="11" fill="#8A8D9A">issue</text>
      <text x="100" y="86" font-size="11" fill="#F38BA8">waiting</text>

      <text x="0" y="104" font-size="11" fill="#8A8D9A">waiting_for</text>
      <text x="100" y="104" font-size="11" fill="#C4C7D2">staging creds</text>

      <text x="0" y="122" font-size="11" fill="#8A8D9A">started</text>
      <text x="100" y="122" font-size="11" fill="#E4E6F0">2026-05-24</text>

      <text x="0" y="152" font-size="12" fill="#CBA6F7" font-weight="700">## References</text>
      <text x="0" y="172" font-size="11" fill="#C4C7D2">- [PR #847](github…)</text>
      <text x="0" y="188" font-size="11" fill="#C4C7D2">- Slack #incident-2026-05-23</text>

      <text x="0" y="218" font-size="12" fill="#CBA6F7" font-weight="700">## Notes</text>
      <text x="0" y="238" font-size="11" fill="#C4C7D2">HMAC signature drift on the</text>
      <text x="0" y="252" font-size="11" fill="#C4C7D2">renewal path. Clock skew?</text>
      <text x="0" y="266" font-size="11" fill="#C4C7D2">Repro on staging once creds</text>
      <text x="0" y="280" font-size="11" fill="#C4C7D2">land.</text>
    </g>

    <!-- ── STATUS / KEYMAP BAR ────────────────────────── -->
    <rect x="20" y="488" width="940" height="52" fill="#1A1B22"/>
    <line x1="20" y1="488" x2="960" y2="488" stroke="#2A2D38"/>

    <g transform="translate(40,508)">
      <!-- key chips -->
      <g>
        <rect x="0" y="-13" width="22" height="20" rx="4" fill="#CBA6F7"/>
        <text x="11" y="2" class="key" text-anchor="middle">n</text>
        <text x="28" y="2" class="keylbl">capture</text>
      </g>
      <g transform="translate(108,0)">
        <rect x="0" y="-13" width="22" height="20" rx="4" fill="#FACC15"/>
        <text x="11" y="2" class="key" text-anchor="middle">m</text>
        <text x="28" y="2" class="keylbl">move →</text>
      </g>
      <g transform="translate(212,0)">
        <rect x="0" y="-13" width="22" height="20" rx="4" fill="#86EFAC"/>
        <text x="11" y="2" class="key" text-anchor="middle">f</text>
        <text x="28" y="2" class="keylbl">finish</text>
      </g>
      <g transform="translate(304,0)">
        <rect x="0" y="-13" width="22" height="20" rx="4" fill="#5EEAD4"/>
        <text x="11" y="2" class="key" text-anchor="middle">p</text>
        <text x="28" y="2" class="keylbl">pin / unpin</text>
      </g>
      <g transform="translate(412,0)">
        <rect x="0" y="-13" width="22" height="20" rx="4" fill="#F38BA8"/>
        <text x="11" y="2" class="key" text-anchor="middle">b</text>
        <text x="28" y="2" class="keylbl">block</text>
      </g>
      <g transform="translate(508,0)">
        <rect x="0" y="-13" width="32" height="20" rx="4" fill="#3A3D48"/>
        <text x="16" y="2" class="key" fill="#E4E6F0" text-anchor="middle">↵</text>
        <text x="38" y="2" class="keylbl">open</text>
      </g>
      <g transform="translate(596,0)">
        <rect x="0" y="-13" width="32" height="20" rx="4" fill="#3A3D48"/>
        <text x="16" y="2" class="key" fill="#E4E6F0" text-anchor="middle">⇥</text>
        <text x="38" y="2" class="keylbl">pane</text>
      </g>
      <g transform="translate(684,0)">
        <rect x="0" y="-13" width="22" height="20" rx="4" fill="#3A3D48"/>
        <text x="11" y="2" class="key" fill="#E4E6F0" text-anchor="middle">q</text>
        <text x="28" y="2" class="keylbl">quit</text>
      </g>
    </g>

    <!-- right-side status -->
    <text x="940" y="510" class="mono" font-size="11" fill="#5EEAD4" text-anchor="end">● synced  ·  v0.9.2</text>
    <text x="940" y="526" class="mono" font-size="10" fill="#6B6E7A" text-anchor="end">cwd: ~/code/my-project</text>
  </g>
</svg>
