<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" width="100%" role="img" aria-label="The five axes of task state">
  <defs>
    <style>
      :root {
        --fg: #1A1B22;
        --muted: #3A3D48;
        --dim: #6B6E7A;
        --field: #7C4DD9;
        --panel-bg: #FAFAFC;
        --panel-border: #D5D7E0;
        --fill-blue:   #E8F0FB;
        --fill-teal:   #DCFAF3;
        --fill-purple: #F3ECFC;
        --fill-yellow: #FBF2D4;
        --fill-pink:   #FCE4EB;
        --stroke-blue:   #3D7CC4;
        --stroke-teal:   #1FA587;
        --stroke-purple: #7C4DD9;
        --stroke-yellow: #B58A0F;
        --stroke-pink:   #C9466B;
        --chip-blue:   #3D7CC4;
        --chip-teal:   #1FA587;
        --chip-purple: #7C4DD9;
        --chip-yellow: #B58A0F;
        --chip-pink:   #C9466B;
        --chip-fg: #FFFFFF;
        --vis-bg: #FFF6D6;
        --vis-stroke: #B58A0F;
        --derived-bg: #DCFAF3;
        --derived-stroke: #1FA587;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #F5F5F7;
          --muted: #C4C7D2;
          --dim: #8A8D9A;
          --field: #CBA6F7;
          --panel-bg: #16171E;
          --panel-border: #3A3D48;
          --fill-blue:   #1F2A3A;
          --fill-teal:   #1F3530;
          --fill-purple: #2A2540;
          --fill-yellow: #3A2F1A;
          --fill-pink:   #3A1F25;
          --stroke-blue:   #7AB8FF;
          --stroke-teal:   #5EEAD4;
          --stroke-purple: #CBA6F7;
          --stroke-yellow: #FACC15;
          --stroke-pink:   #F38BA8;
          --chip-blue:   #7AB8FF;
          --chip-teal:   #5EEAD4;
          --chip-purple: #CBA6F7;
          --chip-yellow: #FACC15;
          --chip-pink:   #F38BA8;
          --chip-fg: #0F1014;
          --vis-bg: #2A2520;
          --vis-stroke: #FACC15;
          --derived-bg: #1F3530;
          --derived-stroke: #5EEAD4;
        }
      }
      .axis-name  { font-family: -apple-system, system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: var(--fg); }
      .axis-q     { font-family: -apple-system, system-ui, sans-serif; font-size: 11px; fill: var(--muted); font-style: italic; }
      .axis-field { font-family: ui-monospace, monospace; font-size: 11px; fill: var(--field); font-weight: 600; }
      .axis-val   { font-family: ui-monospace, monospace; font-size: 10.5px; fill: var(--dim); }
      .axis-val-bright { font-family: ui-monospace, monospace; font-size: 11.5px; fill: var(--field); }
      .axis-val-mid    { font-family: ui-monospace, monospace; font-size: 11.5px; fill: var(--muted); }
      .side-h     { font-family: -apple-system, system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: var(--fg); }
      .side-q     { font-family: -apple-system, system-ui, sans-serif; font-size: 11px; fill: var(--muted); font-style: italic; }
      .card-blue   { fill: var(--fill-blue);   stroke: var(--stroke-blue); }
      .card-teal   { fill: var(--fill-teal);   stroke: var(--stroke-teal); }
      .card-purple { fill: var(--fill-purple); stroke: var(--stroke-purple); }
      .card-yellow { fill: var(--fill-yellow); stroke: var(--stroke-yellow); }
      .card-pink   { fill: var(--fill-pink);   stroke: var(--stroke-pink); }
      .chip-blue   { fill: var(--chip-blue); }
      .chip-teal   { fill: var(--chip-teal); }
      .chip-purple { fill: var(--chip-purple); }
      .chip-yellow { fill: var(--chip-yellow); }
      .chip-pink   { fill: var(--chip-pink); }
      .chip-fg     { fill: var(--chip-fg); }
      .chip-fg-bg  { fill: var(--panel-bg); }
      .vis-card    { fill: var(--vis-bg); stroke: var(--vis-stroke); }
      .derived-card{ fill: var(--derived-bg); stroke: var(--derived-stroke); }
    </style>
  </defs>

  <!-- ── ROW 1 (top): 3 cards ──────────────────────────── -->

  <!-- 1. PIPELINE -->
  <rect class="card-blue" x="20" y="30" width="240" height="150" rx="12" stroke-width="1.5"/>
  <g transform="translate(40,52)">
    <rect class="chip-blue" x="0" y="0" width="44" height="44" rx="10" opacity="0.25"/>
    <circle class="chip-blue" cx="9" cy="22" r="3.5"/>
    <circle class="chip-blue" cx="22" cy="22" r="3.5"/>
    <circle class="chip-blue" cx="35" cy="22" r="3.5"/>
    <line x1="12" y1="22" x2="19" y2="22" stroke="var(--chip-blue)" stroke-width="1.5"/>
    <line x1="25" y1="22" x2="32" y2="22" stroke="var(--chip-blue)" stroke-width="1.5"/>
  </g>
  <text x="100" y="68" class="axis-name">PIPELINE</text>
  <text x="100" y="84" class="axis-q">Where in my workflow?</text>
  <text x="40" y="124" class="axis-field">bucket:</text>
  <text x="40" y="144" class="axis-val">backlog · next · now</text>
  <text x="40" y="160" class="axis-val">done · dropped</text>

  <!-- 2. DOMAIN WORKFLOW -->
  <rect class="card-teal" x="270" y="30" width="240" height="150" rx="12" stroke-width="1.5"/>
  <g transform="translate(290,52)">
    <rect class="chip-teal" x="0" y="0" width="44" height="44" rx="10" opacity="0.25"/>
    <circle class="chip-teal" cx="10" cy="22" r="3"/>
    <circle class="chip-teal" cx="34" cy="10" r="3"/>
    <circle class="chip-teal" cx="34" cy="22" r="3"/>
    <circle class="chip-teal" cx="34" cy="34" r="3"/>
    <g fill="none" stroke="var(--chip-teal)" stroke-width="1.8" stroke-linecap="round">
      <path d="M 13 22 Q 22 22 31 10"/>
      <path d="M 13 22 L 31 22"/>
      <path d="M 13 22 Q 22 22 31 34"/>
    </g>
  </g>
  <text x="350" y="68" class="axis-name">DOMAIN WORKFLOW</text>
  <text x="350" y="84" class="axis-q">What sub-stage of work?</text>
  <text x="290" y="124" class="axis-field">stage:</text>
  <text x="290" y="144" class="axis-val">free-form, e.g.</text>
  <text x="290" y="160" class="axis-val">idea · draft · published</text>

  <!-- 3. RUNTIME -->
  <rect class="card-purple" x="520" y="30" width="220" height="150" rx="12" stroke-width="1.5"/>
  <g transform="translate(540,52)">
    <rect class="chip-purple" x="0" y="0" width="44" height="44" rx="10" opacity="0.25"/>
    <polygon class="chip-purple" points="16,12 16,32 34,22"/>
  </g>
  <text x="600" y="68" class="axis-name">RUNTIME</text>
  <text x="600" y="84" class="axis-q">Is a machine running it?</text>
  <text x="540" y="124" class="axis-field">run_state:</text>
  <text x="540" y="144" class="axis-val">queued · running</text>
  <text x="540" y="160" class="axis-val">finished · failed</text>

  <!-- ── ROW 2 (bottom-left): 2 cards ──────────────────── -->

  <!-- 4. ATTENTION -->
  <rect class="card-yellow" x="20" y="200" width="240" height="150" rx="12" stroke-width="1.5"/>
  <g transform="translate(40,222)">
    <rect class="chip-yellow" x="0" y="0" width="44" height="44" rx="10" opacity="0.25"/>
    <g transform="translate(22,22) rotate(-30)" class="chip-yellow">
      <rect x="-6" y="-12" width="12" height="6" rx="1"/>
      <path d="M -7 -6 L 7 -6 L 4 4 L -4 4 Z"/>
      <line x1="0" y1="4" x2="0" y2="14" stroke="var(--chip-yellow)" stroke-width="1.5"/>
    </g>
  </g>
  <text x="100" y="238" class="axis-name">ATTENTION</text>
  <text x="100" y="254" class="axis-q">Jump to the top?</text>
  <text x="40" y="294" class="axis-field">pinned:</text>
  <text x="40" y="314" class="axis-val">true</text>
  <text x="40" y="330" class="axis-val">(absent = not pinned)</text>

  <!-- 5. IMPEDIMENT -->
  <rect class="card-pink" x="270" y="200" width="240" height="150" rx="12" stroke-width="1.5"/>
  <g transform="translate(290,222)">
    <rect class="chip-pink" x="0" y="0" width="44" height="44" rx="10" opacity="0.25"/>
    <path d="M 14 20 V 16 a 8 8 0 0 1 16 0 V 20" fill="none" stroke="var(--chip-pink)" stroke-width="2.2"/>
    <rect class="chip-pink" x="11" y="20" width="22" height="16" rx="2.5"/>
    <circle class="chip-fg-bg" cx="22" cy="27" r="2"/>
  </g>
  <text x="350" y="238" class="axis-name">IMPEDIMENT</text>
  <text x="350" y="254" class="axis-q">Anything stuck?</text>
  <text x="290" y="294" class="axis-field">issue:</text>
  <text x="290" y="314" class="axis-val">blocked · waiting</text>
  <text x="290" y="330" class="axis-val">+ blocked_by / waiting_for</text>

  <!-- ── RIGHT SIDE: visibility ─────────────────────────── -->
  <rect class="vis-card" x="520" y="200" width="220" height="150" rx="12" stroke-dasharray="4,3"/>
  <text x="630" y="226" class="side-h" text-anchor="middle">+ VISIBILITY</text>
  <text x="630" y="246" class="side-q" text-anchor="middle">Should I see this at all?</text>
  <text x="630" y="278" class="axis-field" text-anchor="middle">archived:</text>
  <text x="630" y="298" class="axis-val" text-anchor="middle">true   (default: visible)</text>
  <text x="630" y="324" class="axis-val" text-anchor="middle">— not really an axis</text>

  <!-- ── BOTTOM STRIP: derived ─────────────────────────── -->
  <rect class="derived-card" x="20" y="370" width="720" height="140" rx="12"/>
  <text x="40" y="396" class="side-h">📐 Derived, not stored</text>
  <text x="40" y="414" class="side-q">Octopus computes these on the fly — they live nowhere on disk.</text>

  <text x="40" y="448" class="axis-val-bright">"started?"</text>
  <text x="40" y="466" class="axis-val-mid">→ start_date is set</text>

  <text x="260" y="448" class="axis-val-bright">"finished?"</text>
  <text x="260" y="466" class="axis-val-mid">→ bucket: done</text>

  <text x="480" y="448" class="axis-val-bright">"open loop?"</text>
  <text x="480" y="466" class="axis-val-mid">→ bucket NOT IN (done, dropped)</text>
</svg>
