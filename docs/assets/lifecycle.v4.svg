<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 660" width="100%" role="img" aria-label="A typical task lifecycle, shown as terminal commands">
  <defs>
    <linearGradient id="lifeWinBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15161D"/>
      <stop offset="100%" stop-color="#0F1014"/>
    </linearGradient>
    <filter id="lifeWinShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono   { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
      .ttl    { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; fill: #8A8D9A; }
      .cmt    { font-size: 12.5px; fill: #6B6E7A; font-style: italic; }
      .prompt { font-size: 13.5px; fill: #5EEAD4; font-weight: 700; }
      .cmd    { font-size: 13.5px; fill: #E4E6F0; }
      .arg    { font-size: 13.5px; fill: #CBA6F7; }
      .out-c  { font-size: 13px; fill: #C4C7D2; }
      .out-m  { font-size: 13px; fill: #8A8D9A; }
    </style>
  </defs>

  <!-- terminal window -->
  <g filter="url(#lifeWinShadow)">
    <rect x="20" y="20" width="720" height="620" rx="14" fill="url(#lifeWinBg)" stroke="#2A2D38" stroke-width="1"/>
    <!-- title bar -->
    <rect x="20" y="20" width="720" height="36" rx="14" fill="#1A1B22"/>
    <rect x="20" y="40" width="720" height="16" fill="#1A1B22"/>
    <!-- traffic lights -->
    <circle cx="42" cy="38" r="6.5" fill="#FF5F57"/>
    <circle cx="62" cy="38" r="6.5" fill="#FEBC2E"/>
    <circle cx="82" cy="38" r="6.5" fill="#28C840"/>
    <!-- title -->
    <text x="380" y="42" text-anchor="middle" class="ttl mono">~/code/my-project — octopus — lifecycle</text>
  </g>

  <!-- ── step 1: capture ── -->
  <text x="50" y="92" class="mono cmt"># 1. capture an idea</text>
  <text x="50" y="114" class="mono">
    <tspan class="prompt">$</tspan>
    <tspan class="cmd" dx="6">octopus capture</tspan>
    <tspan class="arg" dx="6">"fix the webhook auth bug"</tspan>
  </text>
  <text x="50" y="134" class="mono out-c">📥 file appears at .octopus/tasks/backlog/fix-webhook-auth-bug.md</text>

  <!-- ── step 2: focus ── -->
  <text x="50" y="172" class="mono cmt"># 2. focus on it</text>
  <text x="50" y="194" class="mono">
    <tspan class="prompt">$</tspan>
    <tspan class="cmd" dx="6">octopus focus</tspan>
    <tspan class="arg" dx="6">fix-webhook-auth-bug</tspan>
  </text>
  <text x="50" y="214" class="mono out-c">🎯 moved to tasks/now/ · pinned: true · sorts to top of every list</text>

  <!-- ── step 3: start ── -->
  <text x="50" y="252" class="mono cmt"># 3. start the work</text>
  <text x="50" y="274" class="mono">
    <tspan class="prompt">$</tspan>
    <tspan class="cmd" dx="6">octopus start</tspan>
    <tspan class="arg" dx="6">fix-webhook-auth-bug</tspan>
  </text>
  <text x="50" y="294" class="mono out-c">⏱️  start_date stamped (today) · idempotent — re-run, nothing changes</text>

  <!-- ── step 4: block ── -->
  <text x="50" y="332" class="mono cmt"># 4. hit a blocker, log it</text>
  <text x="50" y="354" class="mono">
    <tspan class="prompt">$</tspan>
    <tspan class="cmd" dx="6">octopus block</tspan>
    <tspan class="arg" dx="6">fix-webhook-auth-bug --reason "missing test creds"</tspan>
  </text>
  <text x="50" y="374" class="mono out-c">🚧 issue: blocked · dated entry appended to memory.md</text>

  <!-- ── step 5: unblock ── -->
  <text x="50" y="412" class="mono cmt"># 5. blocker clears</text>
  <text x="50" y="434" class="mono">
    <tspan class="prompt">$</tspan>
    <tspan class="cmd" dx="6">octopus unblock</tspan>
    <tspan class="arg" dx="6">fix-webhook-auth-bug</tspan>
  </text>
  <text x="50" y="454" class="mono out-c">✅ impediment cleared · back at it</text>

  <!-- ── step 6: finish ── -->
  <text x="50" y="492" class="mono cmt"># 6. ship it</text>
  <text x="50" y="514" class="mono">
    <tspan class="prompt">$</tspan>
    <tspan class="cmd" dx="6">octopus finish</tspan>
    <tspan class="arg" dx="6">fix-webhook-auth-bug</tspan>
  </text>
  <text x="50" y="534" class="mono out-c">🎉 moved to done/ · end_date stamped · pinned cleared</text>

  <!-- prompt-on-empty (visual cursor at bottom) -->
  <text x="50" y="582" class="mono">
    <tspan class="prompt">$</tspan>
    <tspan class="cmd" dx="6" fill="#5A5D6A">_</tspan>
  </text>
</svg>
