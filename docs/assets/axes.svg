<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" width="100%" role="img" aria-label="The five axes of task state">
  <style>
    .axis-name  { font-family: -apple-system, system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #F5F5F7; }
    .axis-q     { font-family: -apple-system, system-ui, sans-serif; font-size: 11px; fill: #C4C7D2; font-style: italic; }
    .axis-field { font-family: ui-monospace, monospace; font-size: 11px; fill: #CBA6F7; font-weight: 600; }
    .axis-val   { font-family: ui-monospace, monospace; font-size: 10.5px; fill: #8A8D9A; }
    .side-h     { font-family: -apple-system, system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #F5F5F7; }
    .side-q     { font-family: -apple-system, system-ui, sans-serif; font-size: 11px; fill: #C4C7D2; font-style: italic; }
  </style>

  <!-- Backdrop -->
  <rect width="760" height="540" fill="#0F1014"/>

  <!-- ── ROW 1 (top): 3 cards ──────────────────────────── -->

  <!-- 1. PIPELINE -->
  <g>
    <rect x="20" y="30" width="240" height="150" rx="12" fill="#16171E" stroke="#7AB8FF" stroke-width="1.5"/>
    <!-- icon: horizontal track with dots (pipeline) -->
    <g transform="translate(40,52)">
      <rect x="0" y="0" width="44" height="44" rx="10" fill="#1F2A3A"/>
      <circle cx="9" cy="22" r="3.5" fill="#7AB8FF"/>
      <circle cx="22" cy="22" r="3.5" fill="#7AB8FF"/>
      <circle cx="35" cy="22" r="3.5" fill="#7AB8FF"/>
      <line x1="12" y1="22" x2="19" y2="22" stroke="#7AB8FF" stroke-width="1.5"/>
      <line x1="25" y1="22" x2="32" y2="22" stroke="#7AB8FF" stroke-width="1.5"/>
    </g>
    <text x="100" y="68" class="axis-name">PIPELINE</text>
    <text x="100" y="84" class="axis-q">Where in my workflow?</text>
    <text x="40" y="124" class="axis-field">bucket:</text>
    <text x="40" y="144" class="axis-val">backlog · next · now</text>
    <text x="40" y="160" class="axis-val">done · dropped</text>
  </g>

  <!-- 2. DOMAIN WORKFLOW -->
  <g>
    <rect x="270" y="30" width="240" height="150" rx="12" fill="#16171E" stroke="#5EEAD4" stroke-width="1.5"/>
    <!-- icon: branching paths -->
    <g transform="translate(290,52)" fill="none" stroke="#5EEAD4" stroke-width="1.8" stroke-linecap="round">
      <rect x="0" y="0" width="44" height="44" rx="10" fill="#1F3530" stroke="none"/>
      <circle cx="10" cy="22" r="3" fill="#5EEAD4" stroke="none"/>
      <circle cx="34" cy="10" r="3" fill="#5EEAD4" stroke="none"/>
      <circle cx="34" cy="22" r="3" fill="#5EEAD4" stroke="none"/>
      <circle cx="34" cy="34" r="3" fill="#5EEAD4" stroke="none"/>
      <path d="M 13 22 Q 22 22 31 10"/>
      <path d="M 13 22 L 31 22"/>
      <path d="M 13 22 Q 22 22 31 34"/>
    </g>
    <text x="350" y="68" class="axis-name">DOMAIN WORKFLOW</text>
    <text x="350" y="84" class="axis-q">What sub-stage of work?</text>
    <text x="290" y="124" class="axis-field">stage:</text>
    <text x="290" y="144" class="axis-val">free-form, e.g.</text>
    <text x="290" y="160" class="axis-val">idea · draft · published</text>
  </g>

  <!-- 3. RUNTIME -->
  <g>
    <rect x="520" y="30" width="220" height="150" rx="12" fill="#16171E" stroke="#CBA6F7" stroke-width="1.5"/>
    <!-- icon: play triangle / running state -->
    <g transform="translate(540,52)">
      <rect x="0" y="0" width="44" height="44" rx="10" fill="#2A2540"/>
      <polygon points="16,12 16,32 34,22" fill="#CBA6F7"/>
    </g>
    <text x="600" y="68" class="axis-name">RUNTIME</text>
    <text x="600" y="84" class="axis-q">Is a machine running it?</text>
    <text x="540" y="124" class="axis-field">run_state:</text>
    <text x="540" y="144" class="axis-val">queued · running</text>
    <text x="540" y="160" class="axis-val">finished · failed</text>
  </g>

  <!-- ── ROW 2 (bottom-left): 2 cards ──────────────────── -->

  <!-- 4. ATTENTION -->
  <g>
    <rect x="20" y="200" width="240" height="150" rx="12" fill="#16171E" stroke="#FACC15" stroke-width="1.5"/>
    <!-- icon: pushpin -->
    <g transform="translate(40,222)">
      <rect x="0" y="0" width="44" height="44" rx="10" fill="#3A2F1A"/>
      <g transform="translate(22,22) rotate(-30)" fill="#FACC15">
        <rect x="-6" y="-12" width="12" height="6" rx="1"/>
        <path d="M -7 -6 L 7 -6 L 4 4 L -4 4 Z"/>
        <line x1="0" y1="4" x2="0" y2="14" stroke="#FACC15" stroke-width="1.5"/>
      </g>
    </g>
    <text x="100" y="238" class="axis-name">ATTENTION</text>
    <text x="100" y="254" class="axis-q">Jump to the top?</text>
    <text x="40" y="294" class="axis-field">pinned:</text>
    <text x="40" y="314" class="axis-val">true</text>
    <text x="40" y="330" class="axis-val" fill="#6B6E7A">(absent = not pinned)</text>
  </g>

  <!-- 5. IMPEDIMENT -->
  <g>
    <rect x="270" y="200" width="240" height="150" rx="12" fill="#16171E" stroke="#F38BA8" stroke-width="1.5"/>
    <!-- icon: padlock -->
    <g transform="translate(290,222)">
      <rect x="0" y="0" width="44" height="44" rx="10" fill="#3A1F25"/>
      <path d="M 14 20 V 16 a 8 8 0 0 1 16 0 V 20" fill="none" stroke="#F38BA8" stroke-width="2.2"/>
      <rect x="11" y="20" width="22" height="16" rx="2.5" fill="#F38BA8"/>
      <circle cx="22" cy="27" r="2" fill="#3A1F25"/>
    </g>
    <text x="350" y="238" class="axis-name">IMPEDIMENT</text>
    <text x="350" y="254" class="axis-q">Anything stuck?</text>
    <text x="290" y="294" class="axis-field">issue:</text>
    <text x="290" y="314" class="axis-val">blocked · waiting</text>
    <text x="290" y="330" class="axis-val" fill="#6B6E7A">+ blocked_by / waiting_for</text>
  </g>

  <!-- ── RIGHT SIDE NOTES (column, lined up with rows 1-2) ──── -->

  <!-- + VISIBILITY -->
  <g>
    <rect x="520" y="200" width="220" height="150" rx="12" fill="#2A2520" stroke="#FACC15" stroke-dasharray="4,3"/>
    <text x="630" y="226" class="side-h" text-anchor="middle">+ VISIBILITY</text>
    <text x="630" y="246" class="side-q" text-anchor="middle">Should I see this at all?</text>
    <text x="630" y="278" class="axis-field" text-anchor="middle">archived:</text>
    <text x="630" y="298" class="axis-val" text-anchor="middle">true   (default: visible)</text>
    <text x="630" y="324" class="axis-val" text-anchor="middle" fill="#6B6E7A">— not really an axis</text>
  </g>

  <!-- ── BOTTOM STRIP: derived ─────────────────────────── -->
  <rect x="20" y="370" width="720" height="140" rx="12" fill="#16171E" stroke="#5EEAD4"/>
  <text x="40" y="396" class="side-h">📐 Derived, not stored</text>
  <text x="40" y="414" class="side-q">Octopus computes these on the fly — they live nowhere on disk.</text>

  <g font-family="ui-monospace, monospace" font-size="11.5px">
    <!-- started? -->
    <text x="40" y="448" fill="#CBA6F7">"started?"</text>
    <text x="40" y="466" fill="#C4C7D2">→ start_date is set</text>

    <!-- finished? -->
    <text x="260" y="448" fill="#CBA6F7">"finished?"</text>
    <text x="260" y="466" fill="#C4C7D2">→ bucket: done</text>

    <!-- open loop? -->
    <text x="480" y="448" fill="#CBA6F7">"open loop?"</text>
    <text x="480" y="466" fill="#C4C7D2">→ bucket NOT IN (done, dropped)</text>
  </g>
</svg>
