<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 14" shape-rendering="crispEdges" width="256" height="224">
  <!-- v1 — Classic, lavender. 8-bit, square head, 4 stubby tentacles, two black eyes. -->
  <style>
    .body { fill: #CBA6F7; }
    .eye  { fill: #1A1A1A; }
  </style>

  <!-- Head dome (row 0–1): two rows wide top, slight chamfer -->
  <rect class="body" x="3" y="2" width="10" height="2"/>
  <!-- Body mid (row 2–4): full block -->
  <rect class="body" x="2" y="4" width="12" height="5"/>
  <!-- Tentacles (row 5–7): four legs separated by 1px gaps -->
  <rect class="body" x="2"  y="9" width="2" height="3"/>
  <rect class="body" x="5"  y="9" width="2" height="3"/>
  <rect class="body" x="8"  y="9" width="2" height="3"/>
  <rect class="body" x="11" y="9" width="2" height="3"/>

  <!-- Eyes -->
  <rect class="eye" x="5"  y="5" width="2" height="2"/>
  <rect class="eye" x="9"  y="5" width="2" height="2"/>
</svg>
